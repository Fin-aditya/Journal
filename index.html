<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal</title>

    <style>
        /* Base Reset and Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        .box {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: none;
            border-radius: 5px;
            background-color: #444;
            color: white;
            font-size: 16px;
            box-sizing: border-box; /* Prevents input box from leaking outside the container edge */
        }

        button {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #007880;
        }

        /* Unlocked view: Pitch black background */
        .unlocked-state {
            background-color: #000000 !important; 
            display: block;
            width: 100%;
            height: 100vh;
            padding: 40px;
            box-sizing: border-box;
        }

        .unlocked-text {
            font-size: 24px;
            color: #ffffff;
            font-family: monospace;
            margin-bottom: 20px;
        }

        .logout-btn {
            background-color: #333;
            font-size: 14px;
            padding: 8px 15px;
            width: auto; /* Makes button fit the text rather than fill full screen width */
        }
        .logout-btn:hover {
            background-color: #555;
        }

        .hidden {
            display: none !important;
        }

        .error {
            color: #ff4a4a;
            font-size: 14px;
            margin: 5px 0;
            height: 18px; /* Reserves layout space so content doesn't jump when error displays */
        }
    </style>
</head>
<body>

    <div id="login-container" class="box">
        <h2>Enter Password</h2>
        <p id="error-msg" class="error"></p>
        <input type="password" id="password-input" placeholder="Password">
        <button onclick="checkPassword()">Access Website</button>
    </div>

    <div id="main-content" class="hidden">
        <p class="unlocked-text">hello welcome to my open journal.</p>
        <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <script>
        // Set your desired password here
        const CORRECT_PASSWORD = "2005"; 

        function checkPassword() {
            const userInput = document.getElementById("password-input").value;
            const errorMsg = document.getElementById("error-msg");

            if (userInput === CORRECT_PASSWORD) {
                // Change background to pure black
                document.body.classList.add("unlocked-state");

                // Hide login box, reveal secret content
                document.getElementById("login-container").classList.add("hidden");
                document.getElementById("main-content").classList.remove("hidden");
            } else {
                errorMsg.innerText = "Incorrect password. Try again.";
            }
        }

        function logout() {
            // Instantly clear states and reload back to locked screen
            location.reload();
        }

        // Allow pressing "Enter" key on keyboard to submit password
        document.getElementById("password-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>
</body>
</html>
